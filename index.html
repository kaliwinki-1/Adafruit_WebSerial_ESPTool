<!DOCTYPE html>
<html lang="fr">
<head>
    <title>CYM WebFlasher - CYD2USB</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0">
    <link rel="stylesheet" href="css/style.css" />
    
    <script type="module">
        window.esptoolPackage = import("https://cdn.jsdelivr.net/gh/adafruit/Adafruit_WebSerial_ESPTool@latest/dist/web/index.js");
    </script>

    <script src="js/variables.js" defer></script>
    <script src="js/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="left"><img src="assets/logo0.png" class="Adafruit-Logo"></div>
        <div class="right">
            <p class="top-text"><font color="white">Version: </font><b>v1.11.0 CYD2USB</b></p>
        </div>
    </header>

    <main class="main">
        <div class="subheader">
            <a id="butConnect">Connecter</a>
            <a id="butDisconnect" style="display: none;">Déconnecter</a>
            <a id="butClear">Effacer Log</a>
        </div>

        <div id="app">
            <div id="commands" class="connected">
                <div class="upload">
                    <select id="modelSelect" class="dropdown">
                        <option value="NULL" disabled selected>--- SELECT BOARD ---</option>
                        <option value="CYD2USB_MARAUDER">Marauder CYD2USB</option>
                        <option value="CYD2USB_HALEHOUND">HaleHound CYD2USB</option>
                        <option value="CYD2USB_BRUCE">Bruce CYD2USB</option>
                    </select>
                    <select id="versionSelect" class="dropdown">
                        <option value="latest">Version Actuelle</option>
                    </select>
                </div>
                <div class="buttons">
                    <a id="butProgram">Flasher</a>
                    <a id="butErase">Tout Effacer (Erase)</a>
                </div>
            </div>
            <div id="log"></div>
        </div>
    </main>
</body>
</html>
